<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies & Torrents Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #121212;
        color: #f8f9fa;
      }
      .navbar {
        background-color: #1f1f1f !important;
        border-bottom: 1px solid #333;
      }
      .card {
        background-color: #1f1f1f;
        border-color: #333;
      }
      .table {
        color: #f8f9fa;
      }
      .table-striped > tbody > tr:nth-of-type(odd) > * {
        color: #f8f9fa;
      }
      .table-hover > tbody > tr:hover > * {
        color: #fff;
        background-color: #2c2c2c;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">MoviesParser Admin</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarsExample"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarsExample">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/movies">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/now_playing">Now Playing</a>
            </li>
          </ul>
          <div class="d-flex">
            <button class="btn btn-sm btn-outline-danger fw-bold" onclick="confirmShutdown()">🔌 Shutdown Server</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container">{% block content %}{% endblock %}</div>

    <script>
      function confirmShutdown() {
          if (confirm("ВНИМАНИЕ: Это полностью остановит парсер и выключит веб-интерфейс. Потребуется ручной перезапуск через консоль. Вы уверены?")) {
              fetch('/api/shutdown', { method: 'POST' })
                  .then(() => {
                      document.body.innerHTML = `
                          <div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#121212; color:white; flex-direction:column;">
                              <h1>🔌 Сервер успешно выключен</h1>
                              <p class="text-muted mt-3">Вы можете закрыть это окно. Для повторного запуска админки вызовите 'python web_app.py' в консоли.</p>
                          </div>
                      `;
                  })
                  .catch(err => alert("Ошибка выключения: " + err));
          }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
